server:
  name: "Threadwalker"
  telnet_port: 4000
  websocket_port: 4001
  max_connections: 200
  tick_rate_ms: 100

admin:
  handle: Weaver
  email: travis@example.com
  # password intentionally omitted - supplied via TAPESTRY_ADMIN_PASSWORD in env_file

accounts:
  max_concurrent_characters: 1

link_dead:
  enabled: true
  timeout_seconds: 120

telemetry:
  enabled: true
  endpoint: "http://otel-collector:4317"
  protocol: grpc
  service_name: tapestry

logging:
  level: Information

persistence:
  save_path: "./data/saves"
  autosave_interval: 3000
  password_min_length: 6
  max_login_attempts: 5

networking:
  negotiation_timeout_ms: 500
  # Caddy reverse proxy fronts the engine on the tapestry_default docker bridge.
  # Trusting it lets ForwardedHeaders rewrite RemoteIpAddress to the real client
  # IP (from X-Forwarded-For) instead of logging the bridge IP (172.18.0.x).
  trusted_proxies:
    - 172.18.0.0/16   # docker bridge (tapestry_default) -- Caddy connects from here
    - 127.0.0.1/32    # loopback (local health checks)

pre_auth:
  enabled: true
  token_expiry_seconds: 60

mssp:
  name: "Threadwalker"
  codebase: "Tapestry"
  contact: ""
  hostname: threadwalker.tapestryengine.com
  port: 4000
  created: "2026"
  language: "English"
  family: "Custom"
  gameplay:
    - Roleplaying
  classes: true
  races: true
  levels: true
  equipment: true
  multiplaying: false
  player_killing: false

llm:
  enabled: true
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o"
  structured_output: true
  requires_key: true
  temperature: 0.8
  max_sentences: 5
  # TODO(game-hub-threads content plan): replace with Threadwalker's own voice
  # (the Weaver, the Tapestry, the Loom) once the fiction lands. This shell
  # carries no game content, so the prompt below is a neutral placeholder.
  system_prompt: |
    You write room descriptions for a text MUD. Voice: second person, present
    tense, terse and grounded. No preamble, no "Sure!". Output only the description.

    Rules:
    - Honor the area's Theme (given in context) for tone, genre, and sensory palette.
    - Name at least one specific, physical thing the player could look at, touch,
      or walk toward: a named plant, object, structure, or landmark. No pure mood.
    - Concrete nouns over adjectives. Two adjectives per sentence, maximum.
    - Vary length to fit the room. A plain passage or connector is 1-2 sentences;
      a threshold, landmark, or named feature earns 3-5. Never pad; let the room decide.
