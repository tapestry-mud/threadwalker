name: Config Sync
# (re-saved to force GitHub Actions to register this workflow -- it never
# appeared in the Actions workflow list after the repo's first push, unlike
# the other three workflow files pushed in the same commit.)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'server.yaml'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Copy config files to droplet
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "server.yaml"
          target: /opt/tapestry/threadwalker
          overwrite: true

      - name: Restart server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/tapestry/threadwalker
            tapestry stop
            tapestry start
            echo "Config synced and server restarted"
